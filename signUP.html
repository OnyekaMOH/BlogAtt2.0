<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="signUP.css" />
</head>
<body>
    <section id="shapeIt">
        <div class="giveShape red" >x</div>
        <div class="giveShape yellow">-</div>
        <div class="giveShape green">()</div>
        </section>
    <div id="surroundLine1">
        <div id="surroundLine2">
            <nav id="nav">
                <a id="blogHomeIcon" href="index.html"><img id="homeIcon" 
                    src="./icons8-funny-face-dotted/ogbeni-icons8-funny-face-100.png" 
                    alt="funny face emoji">Ogbeni Blog</a>
                <div class="nav-links">
                    <a href="index.html">Home</a>
                    <a href="comingSoon.html">Product</a>
                    <a href="comingSoon.html">Interview</a>
                    <a href="comingSoon.html">Resources</a>
                    <a href="comingSoon.html">About</a>
                </div>
            </nav>
            <main>
                <h1>Sign Up</h1>
  <p>Please fill out this form with the required information</p>
  <form method="post" action=''>
    <fieldset>
      <label for="first-name">Enter Your First Name: <input id="first-name" name="first-name" type="text" required /></label>
      <label for="last-name">Enter Your Last Name: <input id="last-name" name="last-name" type="text" required /></label>
      <label for="email">Enter Your Email: <input id="email" name="email" type="email" required /></label>
      <label for="new-password">Create a New Password: <input id="new-password" name="new-password" type="password" pattern="[a-z0-5]{8,}" required /></label>
    </fieldset>
    <fieldset>
      <legend>Information Category (required)</legend>
      <label for="technology-type"><input id="technology-type" type="radio" name="account-type" value="technology" class="inline" checked /> Technology</label>
      <label for="lifestyle-type"><input id="lifestyle-type" type="radio" name="account-type" value="lifestyle" class="inline" /> Lifestyle</label>
    </fieldset>
    <fieldset>
      <label for="profile-picture">Upload a profile picture: <input id="profile-picture" type="file" name="file" /></label>
      <label for="age">Input your age (years): <input id="age" type="number" name="age" min="13" max="120" /></label>
      <label for="referrer">How did you hear about us?
        <select id="referrer" name="referrer">
          <option value="">(select one)</option>
          <option value="1">Newspaper</option>
          <option value="2">Our YouTube Channel</option>
          <option value="3">Online Ads</option>
          <option value="4">Other</option>
        </select>
      </label>
      <label for="bio">Provide us with a feedback:
        <textarea id="bio" name="bio" rows="3" cols="30" placeholder="We would love to know your thoughts"></textarea>
      </label>
    </fieldset>
    <a href="./comingSoon.html">Read our terms and conditions</a>
    <label for="terms-and-conditions">
      <input class="inline" name="terms" id="terms-and-conditions" type="checkbox" required />
      I accept the terms and conditions
    </label>
    <input type="submit" value="Submit" />
  </form>
            </main>
        </div>
    </div>
</body>
</html>
